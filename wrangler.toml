#:schema https://raw.githubusercontent.com/cloudflare/wrangler/main/packages/wrangler/config-schema.json
name = "fandango-watcher"
# From Cloudflare dashboard URL: https://dash.cloudflare.com/<account_id>/...
account_id = "7f3e024b68ea359931e13d4688fde4a6"
main = "src/fandango_watcher/worker.py"
compatibility_date = "2026-04-30"
compatibility_flags = ["python_workers"]

# Python deps: pyproject.toml + `uv run pywrangler deploy` (see Cloudflare Python packages docs).

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "fandango_watcher_db"
database_id = "a194825e-917f-45fb-bc9b-53e610aa5335"

[browser]
binding = "BROWSER"

# Secrets (Twilio/SMTP): set with `npx wrangler secret put TWILIO_AUTH_TOKEN` etc.
# Required for notify.channels: TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_FROM,
# NOTIFY_TO_E164, SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM, NOTIFY_TO_EMAIL
[vars]
FANDANGO_WATCHER_ENV = "production"
WATCHER_CONFIG = "worker-config.yaml"
