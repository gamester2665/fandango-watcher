# Lint + typecheck + tests on every push and PR. Uses uv + lockfile for reproducibility.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync (locked, including dev tools)
        run: uv sync --locked --group dev

      - name: Playwright Chromium (integration tests)
        run: |
          uv run playwright install-deps
          uv run playwright install chromium

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy src/fandango_watcher

      - name: Pytest
        run: uv run pytest -q
